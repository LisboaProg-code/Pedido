<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eu te amo</title>
    <link rel="stylesheet" href="style2.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css">
</head>
<body>
    <header>
        <nav>
            <ul>
                <li>
                    <i class="ri-arrow-down-s-line"></i>
                </li>

                <li>
                    <h1>Eu te amo tanto Lívia</h1>
                </li>

                <li>
                    <i class="ri-more-line"></i>
                </li>
            </ul>
        </nav>
    </header>

    <main>

        <div class="conteiner_msc">

            <div class="imgMsc"><img src="imgs/hero2.jpeg"></div>

            <div class="conteiner_tittle">
                <div class="text_msc">
                    <h1>Essa Nega</h1>
                    <h2>Bebeto</h2>
                </div>
                <i class="ri-checkbox-circle-fill"></i>
            </div>

            <div class="progress-player">
                <div class="progress" id="progress"></div>
                <div class="music-duraction">
                    <span id="current-time">0:00</span>
                    <span id="duration">0:00</span>
                </div>
            </div>

            <div class="conteiner_controls">
                <i class="ri-shuffle-line"></i>

                <div class="controls">
                    <i class="ri-skip-back-line"></i>
                    <i class="ri-play-circle-fill"></i>
                    <i class="ri-skip-forward-line"></i>
                </div>

                <i class="ri-repeat-2-line"></i>
            </div>

        </div>

    </main>

</body>
</html>
